cross_cutting_prompts:
  C3_existing_project:
    - "Tragfähig oder strukturell kaputt? Vergleichbare Anbieter mit Revenue?"
    - "Wenn tragfähig: fehlt Case / Positionierung / Pricing / Akquise / ICP?"
    - "Wenn kaputt: welche Assets (Lead Engine, Demo-System, E-Com-Wissen) in welches Modell überführen?"
    - "Pivot innerhalb E-Com-AI mit besserer Aussicht?"

  C4_quit_matrix:
    - "30/60/90-Tage-Meilensteine die rational Vollzeit rechtfertigen (konkrete €/Kunden-Zahlen)"
    - "Minimaler Runway in Monaten bei DE-Lebenshaltung"
    - "Ehrlicher Worst Case nach 6 Monaten Vollzeit"
    - "Objektive Abbruchkriterien"
    - "Hybrid-Pfad: Teilzeit/Befristung + Side-Business — rational überlegen?"
    - "Retrospektiven vergleichbarer Solo-NoCode-DACH-Gründer"

  C5_precedents:
    - "3-5 Fälle: Solo, kein CS-Background, <6 Monate auf >5k€/Monat Netto, DACH/EU, NoCode-Stack"
    - "Je Fall: was verkauft, an wen, Kanal, Preis, konkreter Wendepunkt"
    - "Nur nachprüfbare Quellen: Interview, Podcast, LinkedIn-Post, Medienbericht"

  C6_anti_hype:
    - "Modelle die an No-Code-Limits scheitern trotz guter Optik"
    - "Modelle mit zwingend hohen Akquisekosten"
    - "Commodity-Modelle mit Margen gegen Null"
    - "Enterprise-Sales-Zyklen die Solo nicht trägt"
    - "Konkrete Hype-Modelle 2025/2026 explizit ausschließen"

meta_constraints:
  - "Quellen ab 2024, bevorzugt 2025/2026"
  - "Konkrete Zahlen, keine ungestützten Schätzungen"
  - "Jede Empfehlung muss erklären, warum Solo+NoCode+€0-Ads — nicht Funded-Startup"
  - "DACH primär, US/UK nur Referenz"
  - '"funktioniert in Theorie" vs "nachweislich funktioniert" klar trennen'
  - "Wenn Antwort = Festanstellung nehmen, dann so sagen mit Begründung"
  - "Keine Motivations-Frameworks"
