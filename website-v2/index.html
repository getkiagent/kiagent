<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0b0e14" />
    <meta name="robots" content="index, follow" />

    <title>GetKiAgent — Individuelle KI-Support-Automation für DACH E-Commerce</title>
    <meta name="description" content="Individuelle KI-Support-Agenten für Shopify, WooCommerce & Shopware. Auf n8n-Basis, in deiner eigenen Cloud, DSGVO-konform. Kein SaaS-Abo, kein Template." />

    <meta property="og:type" content="website" />
    <meta property="og:locale" content="de_DE" />
    <meta property="og:title" content="GetKiAgent — Individuelle KI-Support-Automation für DACH E-Commerce" />
    <meta property="og:description" content="n8n-basierte Support-Agenten, individuell gebaut. Läuft auf deinem Stack, beantwortet echte Tickets, DSGVO-konform." />
    <meta property="og:site_name" content="GetKiAgent" />
    <meta property="og:url" content="https://getkiagent.de/" />

    <meta property="og:image" content="https://getkiagent.de/og-image.svg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="GetKiAgent — KI-Support-Automation für DACH E-Commerce" />
    <meta name="twitter:description" content="Individuelle n8n-Agenten für deinen Shop. Kein Template." />
    <meta name="twitter:image" content="https://getkiagent.de/og-image.svg" />

    <link rel="canonical" href="https://getkiagent.de/" />

    <script defer data-domain="getkiagent.de" src="https://plausible.io/js/script.js"></script>

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "GetKiAgent",
      "url": "https://getkiagent.de",
      "logo": "https://getkiagent.de/favicon.svg",
      "description": "Individuelle KI-Support-Agenten für DACH E-Commerce auf n8n-Basis.",
      "address": { "@type": "PostalAddress", "addressCountry": "DE" },
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "sales",
        "availableLanguage": "German",
        "url": "https://getkiagent.de/#kontakt"
      }
    }
    </script>

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Service",
      "name": "KI-Support-Automation für E-Commerce",
      "provider": { "@type": "Organization", "name": "GetKiAgent" },
      "serviceType": "AI Customer Support Automation",
      "areaServed": ["DE", "AT", "CH"],
      "description": "n8n-basierte KI-Support-Agenten für Shopify, WooCommerce und Shopware. DSGVO-konform, EU-gehostet, live ab Tag 14.",
      "offers": {
        "@type": "Offer",
        "price": "2000",
        "priceCurrency": "EUR",
        "description": "Einmalige Setup-Gebühr ab €2.000 zzgl. MwSt."
      }
    }
    </script>

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "Wie lange dauert die Integration?",
          "acceptedAnswer": { "@type": "Answer", "text": "Ca. 2 Wochen — parallel zum laufenden Betrieb. Du musst nichts an deinem Shop anpassen. Wir verbinden uns über die bestehende API." }
        },
        {
          "@type": "Question",
          "name": "Was passiert mit den Kundendaten?",
          "acceptedAnswer": { "@type": "Answer", "text": "Alle Daten bleiben in der EU. Auftragsverarbeitungsvertrag (AVV) inklusive. Kein US-Hyperscaler im Datenpfad deiner Kundenanfragen." }
        },
        {
          "@type": "Question",
          "name": "Was wenn der Agent eine Frage nicht beantworten kann?",
          "acceptedAnswer": { "@type": "Answer", "text": "Automatische Eskalation an dein Team — per E-Mail, in Gorgias oder Zendesk, mit vollständigem Gesprächskontext. Kein Ticket geht verloren." }
        },
        {
          "@type": "Question",
          "name": "Wie lange bin ich vertraglich gebunden?",
          "acceptedAnswer": { "@type": "Answer", "text": "Starter: kein Jahresvertrag, monatlich kündbar nach der Setup-Phase. Professional und Enterprise: 6 Monate Mindestlaufzeit." }
        },
        {
          "@type": "Question",
          "name": "Funktioniert das auch mit WooCommerce oder Shopware?",
          "acceptedAnswer": { "@type": "Answer", "text": "Ja. Shopify, WooCommerce und Shopware werden vollständig unterstützt. Für andere Systeme: kurz fragen, meistens lösbar." }
        },
        {
          "@type": "Question",
          "name": "Ich habe keine KI-Erfahrung — ist das ein Problem?",
          "acceptedAnswer": { "@type": "Answer", "text": "Nein. Du bekommst ein fertiges System. Kein Prompting, keine Tool-Einarbeitung, keine Konfigurationsarbeit auf deiner Seite." }
        },
        {
          "@type": "Question",
          "name": "Was kostet das laufend nach dem Setup?",
          "acceptedAnswer": { "@type": "Answer", "text": "Starter: €190/Monat. Professional: €390/Monat. Enthalten: Monitoring, monatliches Reporting, Prompt-Anpassungen und direkter Draht zu mir." }
        }
      ]
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
